service: codechronicle-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 30
  environment:
    BEDROCK_MODEL_ID: us.amazon.nova-premier-v1:0
    SUMMARIES_TABLE: ${self:service}-summaries-${self:provider.stage}
    RISKS_TABLE: ${self:service}-risks-${self:provider.stage}
    USERS_TABLE: ${self:service}-users-${self:provider.stage}
    STAGE: ${self:provider.stage}
    JWT_SECRET: ${env:JWT_SECRET, 'change-me-in-production-use-ssm'}
    JWT_EXPIRY: '7d'
    BREVO_API_KEY: ${env:BREVO_API_KEY, ''}
    BREVO_SENDER_EMAIL: ${env:BREVO_SENDER_EMAIL, 'noreply@codechronicle.dev'}
    BREVO_SENDER_NAME: 'CodeChronicle'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
          Resource: '*'
        - Effect: Allow
          Action:
            - aws-marketplace:ViewSubscriptions
            - aws-marketplace:Subscribe
          Resource: '*'
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt SummariesTable.Arn
            - !GetAtt RisksTable.Arn
            - !GetAtt UsersTable.Arn
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'
  httpApi:
    cors: true

functions:
  # ─── Auth Functions ───────────────────────────────────
  authRegister:
    handler: lambda/authHandler.register
    events:
      - httpApi:
          path: /auth/register
          method: POST
    timeout: 29

  authLogin:
    handler: lambda/authHandler.login
    events:
      - httpApi:
          path: /auth/login
          method: POST
    timeout: 29

  authVerifyEmail:
    handler: lambda/authHandler.verifyEmail
    events:
      - httpApi:
          path: /auth/verify-email
          method: POST
    timeout: 29

  authResendCode:
    handler: lambda/authHandler.resendCode
    events:
      - httpApi:
          path: /auth/resend-code
          method: POST
    timeout: 29

  authVerifyToken:
    handler: lambda/authHandler.verifyTokenHandler
    events:
      - httpApi:
          path: /auth/verify-token
          method: POST
    timeout: 29

  # ─── AI Functions ─────────────────────────────────────
  aiExplain:
    handler: lambda/aiHandler.explain
    events:
      - httpApi:
          path: /ai/explain
          method: POST
    timeout: 29

  aiRiskScore:
    handler: lambda/riskEngine.assessRisk
    events:
      - httpApi:
          path: /ai/risk-score
          method: POST
    timeout: 29

  aiQuery:
    handler: lambda/aiHandler.query
    events:
      - httpApi:
          path: /ai/query
          method: POST
    timeout: 29

  cacheGet:
    handler: lambda/cacheService.get
    events:
      - httpApi:
          path: /cache/{hash}
          method: GET
    timeout: 29

  cachePut:
    handler: lambda/cacheService.put
    events:
      - httpApi:
          path: /cache
          method: POST
    timeout: 29

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    SummariesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.SUMMARIES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: fileHash
            AttributeType: S
          - AttributeName: filePath
            AttributeType: S
        KeySchema:
          - AttributeName: fileHash
            KeyType: HASH
          - AttributeName: filePath
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    RisksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.RISKS_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: fileHash
            AttributeType: S
          - AttributeName: filePath
            AttributeType: S
        KeySchema:
          - AttributeName: fileHash
            KeyType: HASH
          - AttributeName: filePath
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
