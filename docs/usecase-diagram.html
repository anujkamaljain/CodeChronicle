<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeChronicle - Use Case Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap');
  :root {
    --bg: #ffffff; --surface: #f5f5f5; --border: #cccccc;
    --text: #1a1a1a; --muted: #555555; --accent: #1a6dd4;
    --orange: #c9420e; --green: #1a8a30; --purple: #7b3fb5;
    --node-fill: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Instrument Sans',sans-serif; overflow:hidden; width:100vw; height:100vh; }
  svg { width:100%; height:100%; cursor:grab; display:block; }
  svg:active { cursor:grabbing; }
  .title-bar {
    position:fixed; top:0; left:0; right:0; padding:12px 24px;
    background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(255,255,255,.85));
    backdrop-filter:blur(12px); z-index:10; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--border);
  }
  .title-bar h1 { font-size:15px; font-weight:600; letter-spacing:-.3px; }
  .badge { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(26,109,212,.1); color:var(--accent); font-weight:500; }
  .legend {
    position:fixed; bottom:16px; left:16px; background:var(--surface);
    border:1px solid var(--border); border-radius:10px; padding:14px 18px;
    z-index:10; font-size:12px; display:flex; flex-direction:column; gap:7px;
  }
  .legend-item { display:flex; align-items:center; gap:10px; }
  .legend-line { width:30px; height:2px; }
  .legend-line.solid { background:var(--muted); }
  .legend-line.dg { background:repeating-linear-gradient(90deg,var(--green) 0 5px,transparent 5px 9px); }
  .legend-line.do { background:repeating-linear-gradient(90deg,var(--orange) 0 5px,transparent 5px 9px); }
  .controls { position:fixed; bottom:16px; right:16px; display:flex; gap:6px; z-index:10; }
  .controls button {
    width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-size:17px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .15s;
  }
  .controls button:hover { background:var(--border); }
  .tooltip {
    position:fixed; pointer-events:none; z-index:20; background:var(--surface);
    border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:11px;
    max-width:300px; line-height:1.5; display:none; box-shadow:0 4px 20px rgba(0,0,0,.12);
  }
</style>
</head>
<body>
<div class="title-bar">
  <h1>CodeChronicle &mdash; Use Case Diagram</h1>
  <span class="badge">UML 2.0</span>
</div>
<div class="legend">
  <div style="font-weight:600;margin-bottom:2px;color:var(--muted)">Legend</div>
  <div class="legend-item"><div class="legend-line solid"></div><span>Association</span></div>
  <div class="legend-item"><div class="legend-line dg"></div><span style="color:var(--green)">&laquo;include&raquo;</span></div>
  <div class="legend-item"><div class="legend-line do"></div><span style="color:var(--orange)">&laquo;extend&raquo;</span></div>
  <div class="legend-item">
    <svg width="18" height="18"><ellipse cx="9" cy="9" rx="8" ry="8" fill="none" stroke="#7b3fb5" stroke-width="1.5"/></svg>
    <span style="color:#7b3fb5">Configuration</span>
  </div>
</div>
<div class="controls">
  <button id="zi" title="Zoom In">+</button>
  <button id="zo" title="Zoom Out">&minus;</button>
  <button id="rv" title="Reset">&#8634;</button>
</div>
<div class="tooltip" id="tt"></div>
<svg id="d" xmlns="http://www.w3.org/2000/svg"></svg>

<script>
const W=2500, H=1700, NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('d');
svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
svg.setAttribute('preserveAspectRatio','xMidYMid meet');

const defs=document.createElementNS(NS,'defs');
defs.innerHTML=`
  <marker id="ai" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#1a8a30"/></marker>
  <marker id="ae" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#c9420e"/></marker>
  <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
svg.appendChild(defs);

const layerAssoc=document.createElementNS(NS,'g');
const layerRel=document.createElementNS(NS,'g');
const layerNodes=document.createElementNS(NS,'g');
const layerActors=document.createElementNS(NS,'g');
svg.appendChild(layerAssoc);
svg.appendChild(layerRel);
svg.appendChild(layerNodes);
svg.appendChild(layerActors);

function el(tag,a={}){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}

const desc={
  UC1:'Discovers all files, parses imports, builds dependency graph, computes complexity metrics (LOC, cyclomatic complexity, coupling).',
  UC2:'Opens interactive Cytoscape.js dependency graph in a webview. Nodes = files, edges = imports.',
  UC3:'Clicking a node shows a 2\u20133 sentence summary. Uses AI when cloud enabled, local fallback otherwise.',
  UC4:'BFS-based impact analysis: direct & indirect dependents affected if this file changes. Computes impact score.',
  UC5:'Natural language Q&A about the codebase. Requires Cloud AI. Uses graph context for accurate answers.',
  UC6:'Structural risk (local metrics) + semantic risk (AI). Combined into overall risk score.',
  UC7:'Dashboard: health score, risk distribution, most risky files, most connected files.',
  UC8:'Opens a file in VS Code editor from graph click, blast radius, or AI query references.',
  UC9:'Full workspace rescan, dependency graph rebuild, metric recomputation.',
  UC10:'AI 7-section summary: purpose, functions, dependencies, patterns, complexity, risks, suggestions.',
  UC11:'AI analysis of two connected files: data flow, coupling, refactoring suggestions.',
  UC12:'Download Markdown risk report with health score, breakdown, file details.',
  UC13:'File watcher auto-updates graph on file create/delete/modify.',
  UC14:'VS Code settings: exclude patterns, cloud AI toggle, AWS endpoint, max files, extensions.',
  UC15:'Toggle to enable/disable AWS Bedrock cloud AI. When off, local-only analysis.',
  UC16:'Glob patterns excluding directories/files (node_modules, dist, .git, etc.).',
  UC17:'Type-ahead search to find and highlight nodes in graph by file name.',
  UC18:'DynamoDB cache (7-day TTL) stores AI summaries and risk scores.'
};

// ============================
// USE CASE POSITIONS - 3 clean columns with generous spacing
// ============================
const ucs=[
  // LEFT COLUMN (x=560) - Core actions the developer directly triggers
  {id:'UC1',  label:'Scan Workspace',           cx:560,  cy:180,  color:'#1a6dd4'},
  {id:'UC9',  label:'Refresh Analysis',          cx:560,  cy:370,  color:'#1a6dd4'},
  {id:'UC2',  label:'View Dependency Graph',     cx:560,  cy:560,  color:'#1a6dd4'},
  {id:'UC8',  label:'Open File in Editor',       cx:560,  cy:750,  color:'#1a6dd4'},
  {id:'UC13', label:'Incremental Graph Update',  cx:560,  cy:940,  color:'#1a6dd4'},
  {id:'UC14', label:'Configure Settings',        cx:560,  cy:1140, color:'#7b3fb5'},
  {id:'UC17', label:'Search Nodes in Graph',     cx:560,  cy:1330, color:'#1a6dd4'},

  // CENTER COLUMN (x=1100) - Analysis features (extend from UC2)
  {id:'UC3',  label:'Get File Summary',          cx:1100, cy:300,  color:'#1a6dd4'},
  {id:'UC4',  label:'Predict Blast Radius',      cx:1100, cy:490,  color:'#1a6dd4'},
  {id:'UC5',  label:'Ask AI About Codebase',     cx:1100, cy:680,  color:'#1a6dd4'},
  {id:'UC6',  label:'Assess File Risk',          cx:1100, cy:870,  color:'#1a6dd4'},
  {id:'UC15', label:'Enable/Disable Cloud AI',   cx:1100, cy:1140, color:'#7b3fb5'},
  {id:'UC16', label:'Set Exclude Patterns',      cx:1100, cy:1330, color:'#7b3fb5'},

  // RIGHT COLUMN (x=1660) - Extended & cloud features
  {id:'UC10', label:'Get Detailed Summary',      cx:1660, cy:210,  color:'#1a6dd4'},
  {id:'UC11', label:'Analyze File Relationship', cx:1660, cy:340,  color:'#1a6dd4'},
  {id:'UC7',  label:'View Risk Dashboard',       cx:1660, cy:610,  color:'#1a6dd4'},
  {id:'UC12', label:'Export Risk Report',         cx:1660, cy:810,  color:'#1a6dd4'},
  {id:'UC18', label:'Cache AI Responses',        cx:1660, cy:1010, color:'#1a6dd4'},
];

const RY=34;
const ucMap={};
ucs.forEach(u=>{u.rx=Math.max(90, u.label.length*5.2+22); u.ry=RY; ucMap[u.id]=u;});

// ============================
// SYSTEM BOUNDARY
// ============================
layerAssoc.appendChild(el('rect',{x:290,y:50,width:1630,height:1420,rx:16,
  fill:'none',stroke:'#999999','stroke-width':2,'stroke-dasharray':'10 5'}));
const sysT=el('text',{x:1105,y:82,'text-anchor':'middle',fill:'#333333',
  'font-size':'20','font-weight':'600','font-family':'Instrument Sans'});
sysT.textContent='CodeChronicle VS Code Extension';
layerAssoc.appendChild(sysT);

// ============================
// ACTORS
// ============================
function drawActor(cx,cy,lines){
  const g=el('g');
  g.appendChild(el('circle',{cx,cy:cy-22,r:12,fill:'none',stroke:'#1a1a1a','stroke-width':1.8}));
  g.appendChild(el('line',{x1:cx,y1:cy-10,x2:cx,y2:cy+16,stroke:'#1a1a1a','stroke-width':1.8}));
  g.appendChild(el('line',{x1:cx-16,y1:cy+2,x2:cx+16,y2:cy+2,stroke:'#1a1a1a','stroke-width':1.8}));
  g.appendChild(el('line',{x1:cx,y1:cy+16,x2:cx-14,y2:cy+34,stroke:'#1a1a1a','stroke-width':1.8}));
  g.appendChild(el('line',{x1:cx,y1:cy+16,x2:cx+14,y2:cy+34,stroke:'#1a1a1a','stroke-width':1.8}));
  lines.forEach((l,i)=>{
    const t=el('text',{x:cx,y:cy+52+i*18,'text-anchor':'middle',fill:'#1a1a1a',
      'font-size':'16','font-weight':'600','font-family':'Instrument Sans'});
    t.textContent=l; g.appendChild(t);
  });
  return {g,cx,cy};
}

const actors={
  dev: drawActor(110,660,['Developer']),
  vsc: drawActor(110,1280,['VS Code']),
  aws: drawActor(2100,560,['AWS Backend','(Bedrock / Lambda','/ DynamoDB)']),
};
for(const a of Object.values(actors)) layerActors.appendChild(a.g);

// ============================
// EDGE POINT ON ELLIPSE
// ============================
function edgePt(uc,tx,ty){
  const dx=tx-uc.cx, dy=ty-uc.cy;
  const s=1/Math.sqrt((dx/uc.rx)**2+(dy/uc.ry)**2);
  return {x:uc.cx+dx*s, y:uc.cy+dy*s};
}

// ============================
// ASSOCIATION LINES (Layer 1 - behind everything)
// ============================
function assoc(ax,ay,ucId){
  const u=ucMap[ucId];
  const p=edgePt(u,ax,ay);
  layerAssoc.appendChild(el('line',{x1:ax,y1:ay,x2:p.x,y2:p.y,
    stroke:'#000000','stroke-width':1.2,opacity:.7}));
}

// Developer → directly initiated use cases
['UC1','UC2','UC4','UC5','UC7','UC8','UC9','UC14','UC17'].forEach(id=>assoc(110,660,id));

// VS Code → system-triggered use cases
['UC8','UC13'].forEach(id=>assoc(110,1280,id));

// AWS Backend → cloud use cases
['UC5','UC10','UC11','UC18'].forEach(id=>assoc(2100,560,id));

// ============================
// INCLUDE / EXTEND LINES (Layer 2)
// ============================
function relLine(fromId,toId,type,offX=0,offY=0){
  const f=ucMap[fromId], t=ucMap[toId];
  const color=type==='include'?'#1a8a30':'#c9420e';
  const marker=type==='include'?'url(#ai)':'url(#ae)';
  const p1=edgePt(f,t.cx,t.cy);
  const p2=edgePt(t,f.cx,f.cy);
  layerRel.appendChild(el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
    stroke:color,'stroke-width':1.4,'stroke-dasharray':'7 4','marker-end':marker}));
  const mx=(p1.x+p2.x)/2+offX, my=(p1.y+p2.y)/2+offY;
  const lbl=type==='include'?'\u00ABinclude\u00BB':'\u00ABextend\u00BB';
  layerRel.appendChild(el('rect',{x:mx-42,y:my-11,width:84,height:20,rx:4,fill:'#ffffff',opacity:.92}));
  const lt=el('text',{x:mx,y:my+4,'text-anchor':'middle',fill:color,
    'font-size':'13','font-family':'Source Code Pro','font-weight':'500'});
  lt.textContent=lbl;
  layerRel.appendChild(lt);
}

// <<include>> - arrow points TO the included (dependency) use case
relLine('UC2','UC1','include');
relLine('UC5','UC1','include',0,-45);
relLine('UC7','UC1','include');
relLine('UC14','UC15','include');
relLine('UC14','UC16','include');

// <<extend>> - arrow points TO the base use case being extended
relLine('UC3','UC2','extend');
relLine('UC4','UC2','extend');
relLine('UC6','UC2','extend');
relLine('UC11','UC2','extend');
relLine('UC10','UC3','extend');
relLine('UC12','UC7','extend');

// ============================
// USE CASE NODES (Layer 3 - on top, solid fill hides lines behind)
// ============================
ucs.forEach(uc=>{
  const g=el('g',{class:'uc','data-id':uc.id});

  const ell=el('ellipse',{cx:uc.cx,cy:uc.cy,rx:uc.rx,ry:uc.ry,
    fill:'#ffffff',stroke:uc.color,'stroke-width':1.6});
  g.appendChild(ell);

  const idT=el('text',{x:uc.cx,y:uc.cy-11,'text-anchor':'middle',
    fill:'#555555','font-size':'13','font-family':'Source Code Pro'});
  idT.textContent=uc.id;
  g.appendChild(idT);

  const lbT=el('text',{x:uc.cx,y:uc.cy+10,'text-anchor':'middle',
    fill:'#1a1a1a','font-size':'15','font-weight':'500','font-family':'Instrument Sans'});
  lbT.textContent=uc.label;
  g.appendChild(lbT);

  ucMap[uc.id].el=g;
  layerNodes.appendChild(g);
});

// ============================
// PAN & ZOOM
// ============================
let vb={x:0,y:0,w:W,h:H}, pan=false, sp={x:0,y:0};
function setVB(){svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);}

svg.addEventListener('mousedown',e=>{pan=true;sp={x:e.clientX,y:e.clientY};});
window.addEventListener('mousemove',e=>{
  if(!pan)return;
  vb.x-=(e.clientX-sp.x)*(vb.w/svg.clientWidth);
  vb.y-=(e.clientY-sp.y)*(vb.h/svg.clientHeight);
  sp={x:e.clientX,y:e.clientY}; setVB();
});
window.addEventListener('mouseup',()=>pan=false);

svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const s=e.deltaY>0?1.07:.93;
  const r=svg.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width, my=(e.clientY-r.top)/r.height;
  const px=vb.x+mx*vb.w, py=vb.y+my*vb.h;
  vb.w*=s; vb.h*=s;
  vb.x=px-mx*vb.w; vb.y=py-my*vb.h; setVB();
},{passive:false});

document.getElementById('zi').onclick=()=>{
  const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;
  vb.w*=.82;vb.h*=.82;vb.x=cx-vb.w/2;vb.y=cy-vb.h/2;setVB();
};
document.getElementById('zo').onclick=()=>{
  const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;
  vb.w*=1.2;vb.h*=1.2;vb.x=cx-vb.w/2;vb.y=cy-vb.h/2;setVB();
};
document.getElementById('rv').onclick=()=>{vb={x:0,y:0,w:W,h:H};setVB();};

// ============================
// HOVER TOOLTIPS
// ============================
const tt=document.getElementById('tt');
document.querySelectorAll('.uc').forEach(g=>{
  const ell=g.querySelector('ellipse');
  const id=g.getAttribute('data-id');
  g.style.cursor='pointer';
  g.addEventListener('mouseenter',()=>{
    ell.setAttribute('stroke-width','2.8');
    ell.setAttribute('fill','rgba(26,109,212,.08)');
    ell.setAttribute('filter','url(#gl)');
    if(desc[id]){tt.innerHTML=`<strong style="color:#1a6dd4">${id}</strong><br>${desc[id]}`;tt.style.display='block';}
  });
  g.addEventListener('mousemove',e=>{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY+14)+'px';});
  g.addEventListener('mouseleave',()=>{
    ell.setAttribute('stroke-width','1.6');
    ell.setAttribute('fill','#ffffff');
    ell.removeAttribute('filter');
    tt.style.display='none';
  });
});
</script>
</body>
</html>
